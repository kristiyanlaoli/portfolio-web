<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kristiyan Laoli</title>
  </head>
  <body>
    <!-- Hero Section Start -->
    <section id="home" class="pt-28">
      <div class="container">
        <div class="flex flex-wrap">
          <div class="w-full self-center px-4 lg:w-1/2">
            <h1
              class="text-base font-semibold text-primary md:text-xl lg:text-2xl"
            >
              Halo Semua 👋, saya
              <span class="block font-bold text-dark text-4xl mt-1 lg:text-5xl"
                >Kristiyan Laoli</span
              >
            </h1>
            <h2
              class="font-medium text-slate-500 text-lg mb-5 lg:text-2xl lg:mt-2"
            >
              <span class="text-dark">Frontend Developer</span> and Physicist
            </h2>
            <p class="font-medium text-slate-400 mb-10 leading-relaxed">
              Seseorang yang suka mempelajari fisika dan pemrograman.
            </p>

            <a
              href="#"
              class="text-base font-semibold text-white bg-primary py-3 px-8 rounded-full hover:shadow-lg hover:opacity-80 transition duration-300 ease-in-out"
              >Hubungi Saya</a
            >
          </div>

          <div class="w-full self-end px-4 lg:w-1/2">
            <div class="relative mt-10 lg:mt-0 lg:right-0">
              <img
                src="src/img/my-photo.png"
                alt="Kristiyan Laoli"
                class="max-w-full mx-auto"
              />
              <span
                class="animate-pulse absolute -bottom-0 -z-10 left-1/2 -translate-x-1/2 md:scale-125 md:bottom-16"
                ><svg
                  width="400"
                  height="400"
                  viewBox="0 0 200 200"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    fill="#14b8a6"
                    d="M66.1,-21.2C75.6,8,66.5,43.5,43.4,60.4C20.3,77.4,-16.8,75.8,-40.6,58C-64.3,40.2,-74.7,6.3,-65.7,-22.1C-56.8,-50.5,-28.4,-73.4,-0.1,-73.4C28.3,-73.4,56.5,-50.4,66.1,-21.2Z"
                    transform="translate(100 100) scale(1.1)"
                  />
                </svg>
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- Hero Section End -->
    <!-- Tools Section Start -->
    <section id="tools">
      <div class="flex flex-wrap">
        <div class="mx-16 grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6">
          <div class="grid content-between p-3 m-5 bg-slate-400">
            <img src="src/img/tool-photos/js.png" alt="JavaScript" />
            <h3 class="bg-white text-base font-bold text-center">JavaScript</h3>
          </div>

          <div class="grid content-between p-3 m-5 bg-slate-400">
            <img src="src/img/tool-photos/html.png" alt="HTML" />
            <h3 class="bg-white text-base font-bold text-center">HTML</h3>
          </div>

          <div class="grid content-between p-3 m-5 bg-slate-400">
            <img src="src/img/tool-photos/css.png" alt="CSS" />
            <h3 class="bg-white text-base font-bold text-center">CSS</h3>
          </div>

          <div class="grid content-between p-3 m-5 bg-slate-400">
            <img src="src/img/tool-photos/reactjs.png" alt="ReactJs" />
            <h3 class="bg-white text-base font-bold text-center">ReactJs</h3>
          </div>

          <div class="grid content-between p-3 m-5 bg-slate-400">
            <img
              src="src/img/tool-photos/tailwind-css.png"
              alt="Tailwind Css"
            />
            <h3 class="bg-white text-base font-bold text-center">
              Tailwind Css
            </h3>
          </div>

          <div class="grid content-between p-3 m-5 bg-slate-400">
            <img src="src/img/tool-photos/python.png" alt="Python" />
            <h3 class="bg-white text-base font-bold text-center">Python</h3>
          </div>
        </div>
      </div>
    </section>
    <!-- Tools Section Ends -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
